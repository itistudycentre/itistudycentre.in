name: Daily Website Backup

on:
  workflow_dispatch:
  schedule:
    - cron: "30 13 * * *"

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Website Repository
        uses: actions/checkout@v4

      - name: Checkout Backup Repository
        uses: actions/checkout@v4
        with:
          repository: itistudycentre/itistudycentre-backup
          token: ${{ secrets.BACKUP_TOKEN }}
          path: backup

      - name: Copy Website Files
        run: |
          rm -rf backup/*
          rsync -av \
            --exclude=".git" \
            --exclude=".github" \
            ./ backup/

      - name: Commit and Push Backup
        run: |
          cd backup
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions.noreply.github.com"

          git add .
          git commit -m "Daily backup $(date '+%Y-%m-%d %H:%M:%S')" || echo "No changes"

          git push https://x-access-token:${{ secrets.BACKUP_TOKEN }}@github.com/itistudycentre/itistudycentre-backup.git HEAD:main
