name: Daily Website Backup

on:
  workflow_dispatch:
  schedule:
    - cron: "30 13 * * *"

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Website Repository
        uses: actions/checkout@v4

      - name: Checkout Backup Repository
        uses: actions/checkout@v4
        with:
          repository: itistudycentre/itistudycentre-backup
          token: ${{ secrets.BACKUP_TOKEN }}
          path: backup

      - name: Sync Website Files
        run: |
          rsync -av --delete \
            --exclude=".git" \
            --exclude=".github" \
            ./ backup/

      - name: Commit and Push
        run: |
          cd backup
          git config user.name "ITI Study Centre Backup"
          git config user.email "backup@itistudycentre.in"

          git add .

          if git diff --cached --quiet; then
            echo "No changes to backup."
            exit 0
          fi

          git commit -m "Backup: $(date '+%Y-%m-%d %H:%M:%S UTC')"
          git push https://x-access-token:${{ secrets.BACKUP_TOKEN }}@github.com/itistudycentre/itistudycentre-backup.git HEAD:main
